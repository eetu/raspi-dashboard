<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Adaptive: inline attrs are the light default (also what rsvg-convert
       bakes into the PNGs); the media query only overrides in scheme-aware
       browsers (live tab + Chromium PWA). Matches the family: #525252 stroke,
       #f78f08 accent, white tile (chat-style). -->
  <style>
    @media (prefers-color-scheme: dark) {
      .tile { fill: #252525; }
      .stroke { stroke: #f0f0f0; }
    }
  </style>
  <rect class="tile" width="512" height="512" fill="#ffffff" />
  <g transform="translate(76 76) scale(15)" fill="none" stroke-width="1.4"
     stroke-linecap="round" stroke-linejoin="round">
    <path class="stroke" stroke="#525252"
          d="M12 2.5 4.5 5.5v6c0 4.4 3 7.7 7.5 9.5 4.5-1.8 7.5-5.1 7.5-9.5v-6L12 2.5Z" />
    <path stroke="#f78f08" d="M5 12.5h3l1.8-3.5 2.6 6 1.8-3.2 1.3 1.2H19" />
  </g>
</svg>
