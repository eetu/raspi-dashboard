name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: "Frontend (Svelte)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.node-version
      # Yarn is vendored (.yarn/releases/*.cjs) and invoked via node — no
      # corepack (node 25+ dropped the bundle), so this is node-version-agnostic
      # and stays in step with the Dockerfile's node 26 build stage.
      - name: Frontend checks
        run: |
          yarn() { node .yarn/releases/yarn-*.cjs "$@"; }
          yarn install --immutable
          yarn lint
          yarn format
          yarn typecheck
          yarn build

  backend:
    name: "Backend (Rust workspace)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo build --workspace --release

  e2e:
    name: "E2E smoke (stack boots + talks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      # The harness (raspi-dashboard-e2e) boots the backend with DEV_AUTH +
      # wiremock'd gatus/beszel + a tempfile trivy report, then drives the
      # /status fan-out and each /api route. #[ignore] so the backend job's
      # `cargo test --workspace` skips it; here we build the binary, then run
      # it explicitly.
      - run: cargo build -p raspi-dashboard-backend
      - run: cargo test -p raspi-dashboard-e2e -- --ignored --nocapture
